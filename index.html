<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Player</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="index.js"></script>
  </head>
  <body>
    
    </div>
    <div class="upload-container mt-4 p-3 text-center">
      <label
        for="audioUpload"
        class="form-label text-secondary small fw-bold text-uppercase"
        >Upload Your Audio</label
      >
      <div class="input-group">
        <input
          type="file"
          class="form-control bg-dark text-secondary border-secondary"
          id="audioUpload"
          accept="audio/*"
        />
        <button class="btn btn-outline-success" type="button" id="uploadButton">
          <i class="bi bi-cloud-arrow-up-fill"></i>
        </button>
      </div>

    <div
      class="player-container d-flex flex-column align-items-center justify-content-center mt-4"
    >
      <div class="music-card p-4">
        <div class="audio-image mb-4 shadow-lg">
          <img
            src="/audio-image.webp"
            alt="Audio Image"
            class="img-fluid rounded"
          />
        </div>

        <div class="audio-title mb-3">
          <h2 class="h4 mb-0 text-white fw-bold">Audio Title</h2>
        </div>

        <div class="playback-slider mb-4">
          <input
            type="range"
            class="form-range custom-slider"
            id="playbackRange"
            min="0"
            max="100"
            value="30"
          />
          <div class="d-flex justify-content-between time-stamps">
            <span>0:00</span>
            <span>0:00</span>
          </div>
        </div>

        <div
          class="controls d-flex align-items-center justify-content-center gap-4 mb-4"
        >
          <i class="bi bi-skip-start-fill secondary-icon"></i>
          <div
            class="play-button bg-white text-dark d-flex align-items-center justify-content-center shadow"
          >
            <i class="bi bi-play-fill"></i>
          </div>
          <i class="bi bi-skip-end-fill secondary-icon"></i>
        </div>

        <div class="volume-container d-flex align-items-center gap-2">
          <i class="bi bi-volume-up text-secondary"></i>
          <div class="volume-slider flex-grow-1">
            <input
              type="range"
              class="form-range custom-slider volume-bar"
              id="volumeRange"
            />
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
